<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search any GitHub user to view their profile, repositories, followers and more." />
    <title>GitHub User Finder</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">

      <!-- ── Header ── -->
      <header>
        <h1><i class="fab fa-github"></i> GitHub User Finder</h1>
        <p>Search for any GitHub user to see their profile and repositories</p>
      </header>

      <!-- ── Search Bar ── -->
      <div class="search-container">
        <input
          type="text"
          id="search"
          placeholder="Enter a GitHub username..."
          autocomplete="off"
        />
        <button id="search-btn"><i class="fas fa-search"></i> Search</button>
      </div>

      <!-- ── Search History Chips ── -->
      <div class="history-container" id="history-container">
        <!-- chips injected by JS -->
      </div>

      <!-- ── Skeleton Loading ── -->
      <div id="skeleton-container" class="hidden">
        <div class="skeleton-profile-card">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-info">
            <div class="skeleton-bar bar-name"></div>
            <div class="skeleton-bar bar-username"></div>
            <div class="skeleton-bar bar-bio"></div>
            <div class="skeleton-bar bar-btn"></div>
          </div>
        </div>
        <div class="skeleton-stats">
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
        </div>
        <div class="skeleton-repos">
          <div class="skeleton-repo-card"></div>
          <div class="skeleton-repo-card"></div>
          <div class="skeleton-repo-card"></div>
          <div class="skeleton-repo-card"></div>
        </div>
      </div>

      <!-- ── Profile Container ── -->
      <div id="profile-container" class="hidden">

        <!-- Profile Header -->
        <div class="profile-card">
          <div class="profile-header">
            <img src="" alt="Profile avatar" id="avatar" />
            <div class="profile-info">
              <h2 id="name"></h2>
              <p id="username"></p>
              <p id="bio" class="bio hidden"></p>
              <div class="location-date">
                <p id="location-wrapper">
                  <i class="fas fa-map-marker-alt"></i>
                  <span id="location">Not specified</span>
                </p>
                <p>
                  <i class="far fa-calendar-alt"></i>
                  Joined <span id="joined-date"></span>
                </p>
              </div>
            </div>
            <a id="profile-link" target="_blank" rel="noreferrer" class="btn-outline">
              View Profile <i class="fas fa-arrow-up-right-from-square"></i>
            </a>
          </div>

          <!-- Stats Row -->
          <div class="stats">
            <div class="stat">
              <i class="fas fa-users"></i>
              <span><strong id="followers"></strong> Followers</span>
            </div>
            <div class="stat">
              <i class="fas fa-user-check"></i>
              <span><strong id="following"></strong> Following</span>
            </div>
            <div class="stat">
              <i class="fas fa-book"></i>
              <span><strong id="repos"></strong> Repos</span>
            </div>
            <div class="stat">
              <i class="fas fa-code"></i>
              <span><strong id="gists"></strong> Gists</span>
            </div>
          </div>

          <!-- Social / Additional Info -->
          <div class="additional-info">
            <div class="info-item" id="company-container">
              <i class="fas fa-building"></i>
              <span id="company"></span>
            </div>
            <div class="info-item" id="blog-container">
              <i class="fas fa-link"></i>
              <a id="blog" target="_blank" rel="noreferrer"></a>
            </div>
            <div class="info-item" id="twitter-container">
              <i class="fab fa-twitter"></i>
              <a id="twitter" target="_blank" rel="noreferrer"></a>
            </div>
          </div>
        </div>

        <!-- ── Repos Section ── -->
        <div class="repos-section">
          <div class="repos-section-header">
            <h3>Latest Repositories</h3>
            <!-- Language filter injected by JS -->
            <select id="language-filter" class="language-filter hidden">
              <option value="all">All Languages</option>
            </select>
          </div>
          <div id="repos-container" class="repos-container">
            <!-- Repo cards injected by JS -->
          </div>
        </div>
      </div>

      <!-- ── Error State ── -->
      <div id="error-container" class="hidden">
        <div class="error-card">
          <div class="error-icon">
            <i class="fas fa-circle-xmark"></i>
          </div>
          <p class="error-message" id="error-message"></p>
          <button class="btn-retry" id="retry-btn">Try Again</button>
        </div>
      </div>

    </div><!-- /container -->

    <script src="script.js"></script>
  </body>
</html>
